; Upload limits for CCR RNF (Seat/Engine)
; Keep this file in public/ because web requests execute from public/index.php

file_uploads = On
max_file_uploads = 600
upload_max_filesize = 16M
post_max_size = 2048M
max_input_vars = 100000
max_input_time = 600
max_execution_time = 600
memory_limit = 1024M
